<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BOOTIK | Admin galeria</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="../assets/css/theme-dark.css" rel="stylesheet"/>
  <script src="../assets/js/theme.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">
  <header class="border-b border-slate-200 bg-white admin-header-bar px-6 py-4 flex flex-wrap items-center justify-between gap-4">
    <a href="../index.html" class="inline-flex items-center shrink-0 no-underline" title="Ir al sitio">
      <img alt="BOOTIK" class="h-12 w-auto md:h-14" src="../assets/Concretos Estampados (1).pdf (1).png"/>
    </a>
    <div id="auth-bar" class="flex items-center gap-3 text-sm">
      <a href="index.html" class="hidden text-red-800 font-semibold no-underline hover:underline" id="link-catalog">Productos</a>
      <span id="auth-email" class="text-slate-600 hidden"></span>
      <button type="button" id="theme-toggle" class="inline-flex items-center justify-center border border-slate-400 bg-white/90 w-9 h-9 text-slate-700 theme-toggle-btn rounded" aria-label="Cambiar tema">
        <span class="material-symbols-outlined text-[20px] t-icon-moon" aria-hidden="true">dark_mode</span>
        <span class="material-symbols-outlined text-[20px] t-icon-sun" aria-hidden="true">light_mode</span>
      </button>
      <button type="button" id="btn-logout" class="hidden px-3 py-1.5 border border-slate-300 rounded font-semibold hover:bg-slate-50 text-slate-800">Cerrar sesion</button>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-10">
    <section id="panel-login" class="max-w-md mx-auto bg-white border border-slate-200 rounded-lg p-8 shadow-sm">
      <div class="flex justify-center mb-6">
        <img alt="BOOTIK" class="h-14 w-auto md:h-16" src="../assets/Concretos Estampados (1).pdf (1).png"/>
      </div>
      <h2 class="font-bold text-lg mb-4 text-center font-['Plus_Jakarta_Sans',sans-serif]">Iniciar sesion</h2>
      <p class="text-xs text-slate-500 mb-4">El usuario debe tener <code class="bg-slate-100 px-1">app_metadata.role = admin</code> en Supabase.</p>
      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1" for="login-email">Email</label>
          <input id="login-email" type="email" required autocomplete="username" class="w-full border border-slate-300 rounded px-3 py-2 text-sm"/>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1" for="login-password">Contrasena</label>
          <input id="login-password" type="password" required autocomplete="current-password" class="w-full border border-slate-300 rounded px-3 py-2 text-sm"/>
        </div>
        <p id="login-error" class="text-sm text-red-700 hidden"></p>
        <button type="submit" class="w-full py-2.5 bg-red-800 text-white font-bold rounded hover:opacity-95">Entrar</button>
      </form>
    </section>

    <section id="panel-app" class="hidden space-y-10">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div>
          <h2 class="font-bold text-lg">Galeria</h2>
          <p class="text-xs text-slate-500">Orden: sort_order, luego fecha</p>
        </div>
        <button type="button" id="btn-new" class="px-4 py-2 bg-red-800 text-white text-sm font-bold rounded hover:opacity-95">Nueva imagen</button>
      </div>

      <div id="list-wrap" class="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm">
        <table class="w-full text-sm">
          <thead class="bg-slate-100 text-left text-xs uppercase tracking-wide text-slate-600">
            <tr>
              <th class="px-4 py-3 w-20">Foto</th>
              <th class="px-4 py-3">Titulo (ES)</th>
              <th class="px-4 py-3">Orden</th>
              <th class="px-4 py-3">Publicado</th>
              <th class="px-4 py-3 w-32"></th>
            </tr>
          </thead>
          <tbody id="gallery-rows"></tbody>
        </table>
        <p id="list-empty" class="p-6 text-slate-500 text-sm hidden">Sin imagenes en la base. Crea una o importa con SQL.</p>
      </div>

      <section id="editor" class="hidden bg-white border border-slate-200 rounded-lg p-6 shadow-sm space-y-4">
        <div class="flex justify-between items-center gap-4">
          <h3 id="editor-title" class="font-bold text-lg">Editar</h3>
          <button type="button" id="btn-close-editor" class="text-sm text-slate-600 hover:underline">Cerrar</button>
        </div>
        <form id="form-gallery" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
          <p id="f-id-hint" class="md:col-span-2 text-xs text-slate-500"></p>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1" for="f-title-es">Titulo ES</label>
            <input id="f-title-es" required class="w-full border border-slate-300 rounded px-3 py-2"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1" for="f-title-en">Titulo EN</label>
            <input id="f-title-en" required class="w-full border border-slate-300 rounded px-3 py-2"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1" for="f-subtitle-es">Subtitulo ES</label>
            <input id="f-subtitle-es" class="w-full border border-slate-300 rounded px-3 py-2"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1" for="f-subtitle-en">Subtitulo EN</label>
            <input id="f-subtitle-en" class="w-full border border-slate-300 rounded px-3 py-2"/>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-600 mb-1" for="f-sort">Orden</label>
            <input id="f-sort" type="number" value="0" class="w-full border border-slate-300 rounded px-3 py-2"/>
          </div>
          <div class="md:col-span-2">
            <label class="block text-xs font-semibold text-slate-600 mb-1" for="f-image">URL de imagen</label>
            <input id="f-image" type="text" class="w-full border border-slate-300 rounded px-3 py-2" placeholder="O sube un archivo abajo"/>
            <input id="f-image-file" type="file" accept="image/*" class="mt-2 text-xs"/>
            <p class="text-xs text-slate-500 mt-1">Bucket Storage: <code class="bg-slate-100 px-1">gallery</code></p>
          </div>
          <div class="md:col-span-2">
            <img id="f-preview" class="max-h-40 rounded border border-slate-200 hidden" alt=""/>
          </div>
          <div class="md:col-span-2 flex items-center gap-2">
            <input id="f-published" type="checkbox" class="rounded border-slate-300" checked/>
            <label for="f-published" class="text-sm font-medium">Publicado en galeria publica</label>
          </div>
          <p id="form-error" class="md:col-span-2 text-sm text-red-700 hidden"></p>
          <div class="md:col-span-2 flex flex-wrap gap-3 pt-2">
            <button type="submit" class="px-5 py-2.5 bg-red-800 text-white font-bold rounded hover:opacity-95">Guardar</button>
            <button type="button" id="btn-delete" class="px-5 py-2.5 border border-red-300 text-red-800 font-bold rounded hover:bg-red-50 hidden">Eliminar</button>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script src="../assets/js/bootik-config.js"></script>
  <script type="module" src="./galeria.js"></script>
</body>
</html>
